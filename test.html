<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veb dizajn test - 20 nasumičnih pitanja</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: white;
            padding: 25px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .timer-section {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: #2c3e50;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .timer {
            font-size: 2rem;
            font-weight: bold;
            font-family: monospace;
            background: #2c3e50;
            color: #ffd700;
            padding: 8px 20px;
            border-radius: 50px;
        }

        .question-counter {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .test-content {
            padding: 30px;
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
        }

        .question-card.correct-highlight {
            border-left: 5px solid #28a745;
        }

        .question-card.incorrect-highlight {
            border-left: 5px solid #dc3545;
        }

        .question-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .question-points {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .question-body {
            padding: 20px;
        }

        .question-text {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #333;
        }

        .fill-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            margin: 10px 0;
            font-family: monospace;
        }

        .fill-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .fill-input.correct-answer {
            border-color: #28a745;
            background: #d4edda;
        }

        .fill-input.incorrect-answer {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .matching-items {
            margin: 15px 0;
        }

        .matching-item {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 12px 15px;
            margin: 10px 0;
            background: white;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .matching-left {
            font-weight: bold;
            min-width: 220px;
            color: #2c3e50;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .matching-arrow {
            color: #667eea;
            font-weight: bold;
        }

        .matching-right {
            flex: 1;
            font-size: 0.9rem;
            color: #555;
        }

        .answer-line {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8f9fa;
            padding: 5px 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            flex-shrink: 0;
        }

        .answer-line label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 1rem;
        }

        .matching-input {
            width: 60px;
            padding: 6px 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .matching-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .matching-input.correct-answer {
            border-color: #28a745;
            background: #d4edda;
        }

        .matching-input.incorrect-answer {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .order-items {
            margin: 15px 0;
        }

        .order-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 15px;
            margin: 8px 0;
            background: white;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .order-number {
            font-weight: bold;
            min-width: 40px;
            color: #667eea;
        }

        .order-text {
            flex: 1;
            font-size: 0.9rem;
            color: #555;
        }

        .order-input {
            width: 60px;
            padding: 6px 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
        }

        .order-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .order-input.correct-answer {
            border-color: #28a745;
            background: #d4edda;
        }

        .order-input.incorrect-answer {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .options-list {
            margin: 15px 0;
        }

        .option-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            background: white;
            cursor: pointer;
        }

        .option-item:hover {
            background: #f0f0f0;
        }

        .option-checkbox {
            width: 18px;
            height: 18px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .option-radio {
            width: 18px;
            height: 18px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .option-text {
            flex: 1;
            font-size: 0.9rem;
            color: #333;
        }

        .feedback-indicator {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .feedback-indicator.correct {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .feedback-indicator.incorrect {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-finish {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .btn-finish:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40,167,69,0.4);
        }

        .btn-reset {
            background: #6c757d;
            color: white;
        }

        .btn-reset:hover {
            background: #5a6268;
        }

        .result-section {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
        }

        .result-score {
            font-size: 2.5rem;
            font-weight: bold;
            color: #28a745;
        }

        .result-feedback {
            margin-top: 15px;
            font-size: 1rem;
        }

        .time-expired {
            background: #dc3545;
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .points-indicator {
            font-size: 0.7rem;
            color: #6c757d;
        }

        @media (max-width: 768px) {
            .test-content {
                padding: 20px;
            }
            .timer-section {
                flex-direction: column;
                text-align: center;
            }
            .matching-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .matching-left {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Veb dizajn test</h1>
            <p>Test sadrži 20 nasumično odabranih pitanja iz oblasti HTML, CSS i Internet tehnologija</p>
        </div>

        <div class="timer-section">
            <div class="question-counter" id="questionCounter">Pitanja: 0 / 20</div>
            <div class="timer">
                ⏱️ <span id="timerDisplay">20:00</span>
            </div>
        </div>

        <div class="test-content" id="testContent">
            <div style="text-align: center; padding: 50px;">
                <p>Učitavanje testa...</p>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-finish" id="finishBtn" onclick="finishTest()">✅ Završi test</button>
            <button class="btn btn-reset" onclick="resetTest()">🔄 Resetuj test</button>
        </div>

        <div id="resultSection" style="display: none;" class="result-section">
            <div class="result-score" id="resultScore">0 / 0</div>
            <div class="result-feedback" id="resultFeedback"></div>
        </div>
    </div>

    <script>

                "Veb server šalje preko Interneta generisani HTML kod veb pretraživaču."
            ], correct: [6, 4, 2, 1, 3, 5] },
            { id: 187,text:"Уредите појмове према захтеву.Дат је низ HTML наредби. Уписивањем редног броја на предвиђену линију (почев од броја 1 до броја 6) поређајте тачним редоследом HTLM наредбе у складу са основном структуром HTML странице:", type: "order", points: 3, steps: [
                "&lt;/body&gt;",
                "&lt;head&gt;",
                "&lt;/html&gt;",
                "&lt;html&gt;",
                "&lt;/head&gt;",
                "&lt;body&gt;"
            ], correct: [5, 2, 6, 1, 3, 4] }
        ];

        let selectedQuestions = [];
        let userAnswers = {};
        let timeLeft = 20 * 60;
        let timerInterval = null;
        let testFinished = false;

        function selectRandomQuestions() {
            const shuffled = [...allQuestions];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, 20);
        }

        function renderQuestions() {
            selectedQuestions = selectRandomQuestions();
            userAnswers = {};
            
            const container = document.getElementById('testContent');
            let html = '';
            
            selectedQuestions.forEach((q, idx) => {
                html += `
                    <div class="question-card" id="q-${idx}">
                        <div class="question-header">
                            <span>Pitanje ${idx + 1} (ID: ${q.id})</span>
                            <span class="question-points">${q.points} poena</span>
                        </div>
                        <div class="question-body">
                            <div class="question-text">
                                <strong>${q.id}. </strong>${getQuestionText(q)}
                            </div>
                `;
                
                if (q.type === 'single') {
                    html += renderSingleChoice(q, idx);
                } else if (q.type === 'multiple') {
                    html += renderMultipleChoice(q, idx);
                } else if (q.type === 'matching') {
                    html += renderMatching(q, idx);
                } else if (q.type === 'order') {
                    html += renderOrder(q, idx);
                } else if (q.type === 'fill') {
                    html += renderFill(q, idx);
                }
                
                html += `
                            <div class="feedback-indicator" id="feedback-${idx}"></div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            document.getElementById('questionCounter').innerHTML = `Pitanja: ${selectedQuestions.length} / 20`;
        }
        
        function getQuestionText(q) {
            if (q.id === 180 || q.id === 181 || q.id === 182) {
                return "Povezati pojmove prema zahtevu. Sa leve strane su dati numerisani HTML tagovi, a sa desne su navedeni indikatori. Na liniju upisati broj kojim se HTML tag povezuje sa odgovarajućim indikatorom koji će se videti na HTML stranici:";
            } else if (q.id === 183) {
                return "Sa leve strane su dati internet servisi, a sa desne strane su definisane operacije koje se izvršavaju pomoću tih servisa. Na liniju ispred definisane operacije napisati broj njemu odgovarajućeg servisa.";
            } else if (q.id === 184) {
                return "Povezati pojmove prema zahtevu. HTML dokument može da primi podatke od korisnika pomoću formi (formulara). Povežite date tagove i atribute sa njihovim definicijama:";
            } else {
                return q.text;
            }
        }
        
        function renderFill(q, idx) {
            return `<input type="text" class="fill-input" id="fill-${idx}" placeholder="Unesite HTML kod..." oninput="saveFillAnswer(${idx}, this.value)">`;
        }
        
        function renderSingleChoice(q, idx) {
            let html = '<div class="options-list">';
            q.options.forEach((opt, optIdx) => {
                html += `
                    <div class="option-item" onclick="document.getElementById('radio-${idx}-${optIdx}').click()">
                        <input type="radio" name="q-${idx}" id="radio-${idx}-${optIdx}" value="${optIdx + 1}" onchange="saveAnswer(${idx}, ${optIdx + 1})">
                        <span class="option-text">${opt}</span>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }
        
        function renderMultipleChoice(q, idx) {
            let html = '<div class="options-list">';
            q.options.forEach((opt, optIdx) => {
                html += `
                    <div class="option-item" onclick="document.getElementById('cb-${idx}-${optIdx}').click()">
                        <input type="checkbox" class="option-checkbox" id="cb-${idx}-${optIdx}" value="${optIdx + 1}" onchange="saveMultipleAnswer(${idx}, ${optIdx + 1})">
                        <span class="option-text">${opt}</span>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }
        
        function renderMatching(q, idx) {
            let html = '<div class="matching-items">';
            for (let i = 0; i < q.leftItems.length; i++) {
                html += `
                    <div class="matching-item">
                        <span class="matching-left">${q.leftItems[i]}</span>
                        <span class="matching-arrow">→</span>
                        <span class="matching-right">${q.rightItems[i]}</span>
                        <div class="answer-line">
                            <label>___</label>
                            <input type="text" class="matching-input" id="match-${idx}-${i}" maxlength="1" placeholder=" " oninput="saveMatchingAnswer(${idx}, ${i}, this.value)">
                            <span class="points-indicator">(${(q.points / q.correct.length).toFixed(1)} poena)</span>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        }
        
        function renderOrder(q, idx) {
            let html = '<div class="order-items">';
            q.steps.forEach((step, i) => {
                html += `
                    <div class="order-item">
                        <span class="order-number">${i + 1}.</span>
                        <span class="order-text">${step}</span>
                        <input type="text" class="order-input" id="order-${idx}-${i}" maxlength="1" placeholder="___" oninput="saveOrderAnswer(${idx}, ${i}, this.value)">
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }
        
        function saveFillAnswer(qIdx, value) {
            if (!userAnswers[qIdx]) userAnswers[qIdx] = {};
            userAnswers[qIdx].answer = value.trim();
            userAnswers[qIdx].type = selectedQuestions[qIdx].type;
        }
        
        function saveAnswer(qIdx, value) {
            if (!userAnswers[qIdx]) userAnswers[qIdx] = {};
            userAnswers[qIdx].answer = value;
            userAnswers[qIdx].type = selectedQuestions[qIdx].type;
        }
        
        function saveMultipleAnswer(qIdx, value) {
            if (!userAnswers[qIdx]) userAnswers[qIdx] = { answer: [] };
            if (!userAnswers[qIdx].answer) userAnswers[qIdx].answer = [];
            
            const cb = document.getElementById(`cb-${qIdx}-${value-1}`);
            if (cb.checked) {
                if (!userAnswers[qIdx].answer.includes(value)) {
                    userAnswers[qIdx].answer.push(value);
                }
            } else {
                userAnswers[qIdx].answer = userAnswers[qIdx].answer.filter(v => v !== value);
            }
            userAnswers[qIdx].answer.sort((a,b) => a-b);
            userAnswers[qIdx].type = selectedQuestions[qIdx].type;
        }
        
        function saveMatchingAnswer(qIdx, matchIdx, value) {
            if (!userAnswers[qIdx]) userAnswers[qIdx] = { answer: [] };
            if (!userAnswers[qIdx].answer) userAnswers[qIdx].answer = [];
            userAnswers[qIdx].answer[matchIdx] = value;
            userAnswers[qIdx].type = selectedQuestions[qIdx].type;
        }
        
        function saveOrderAnswer(qIdx, stepIdx, value) {
            if (!userAnswers[qIdx]) userAnswers[qIdx] = { answer: [] };
            if (!userAnswers[qIdx].answer) userAnswers[qIdx].answer = [];
            userAnswers[qIdx].answer[stepIdx] = value;
            userAnswers[qIdx].type = selectedQuestions[qIdx].type;
        }
        
        function checkFillAnswer(q, userAnswer) {
            if (!userAnswer) return false;
            const normalizedAnswer = userAnswer.toLowerCase().replace(/\s+/g, ' ').trim();
            for (let correct of q.correct) {
                const normalizedCorrect = correct.toLowerCase().replace(/\s+/g, ' ').trim();
                if (normalizedAnswer === normalizedCorrect) {
                    return true;
                }
            }
            return false;
        }
        
        function calculateMultipleChoicePoints(q, userAnswer) {
            if (!userAnswer || !userAnswer.length) return 0;
            
            const userSet = new Set(userAnswer);
            const correctSet = new Set(q.correct);
            
            for (let val of userSet) {
                if (!correctSet.has(val)) {
                    return 0;
                }
            }
            
            const pointsPerCorrect = q.points / correctSet.size;
            let correctCount = 0;
            for (let val of userSet) {
                if (correctSet.has(val)) {
                    correctCount++;
                }
            }
            return correctCount * pointsPerCorrect;
        }
        
        function checkMatching(q, userAnswer) {
            if (!userAnswer || userAnswer.length !== q.correct.length) return false;
            for (let i = 0; i < q.correct.length; i++) {
                if (parseInt(userAnswer[i]) !== q.correct[i]) return false;
            }
            return true;
        }
        
        function checkOrder(q, userAnswer) {
            if (!userAnswer || userAnswer.length !== q.correct.length) return false;
            for (let i = 0; i < q.correct.length; i++) {
                if (parseInt(userAnswer[i]) !== q.correct[i]) return false;
            }
            return true;
        }
        
        function calculatePoints(q, userAnswer) {
            if (q.type === 'single') {
                return (userAnswer === q.correct) ? q.points : 0;
            } else if (q.type === 'multiple') {
                return calculateMultipleChoicePoints(q, userAnswer);
            } else if (q.type === 'matching') {
                return checkMatching(q, userAnswer) ? q.points : 0;
            } else if (q.type === 'order') {
                return checkOrder(q, userAnswer) ? q.points : 0;
            } else if (q.type === 'fill') {
                return checkFillAnswer(q, userAnswer) ? q.points : 0;
            }
            return 0;
        }
        
        function isFullyCorrect(q, userAnswer) {
            if (q.type === 'single') {
                return userAnswer === q.correct;
            } else if (q.type === 'multiple') {
                if (!userAnswer || !userAnswer.length) return false;
                const userSet = new Set(userAnswer);
                const correctSet = new Set(q.correct);
                if (userSet.size !== correctSet.size) return false;
                for (let val of userSet) {
                    if (!correctSet.has(val)) return false;
                }
                return true;
            } else if (q.type === 'matching') {
                return checkMatching(q, userAnswer);
            } else if (q.type === 'order') {
                return checkOrder(q, userAnswer);
            } else if (q.type === 'fill') {
                return checkFillAnswer(q, userAnswer);
            }
            return false;
        }
        
        function finishTest() {
            if (testFinished) return;
            
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            
            testFinished = true;
            let totalPoints = 0;
            let maxPoints = 0;
            
            selectedQuestions.forEach((q, idx) => {
                const userAnswer = userAnswers[idx]?.answer;
                const points = calculatePoints(q, userAnswer);
                const isFullyCorrectAnswer = isFullyCorrect(q, userAnswer);
                totalPoints += points;
                maxPoints += q.points;
                
                const feedbackDiv = document.getElementById(`feedback-${idx}`);
                const questionCard = document.getElementById(`q-${idx}`);
                
                if (isFullyCorrectAnswer) {
                    feedbackDiv.innerHTML = `✅ Tačno! Osvojeno ${points.toFixed(2)} poena.`;
                    feedbackDiv.className = 'feedback-indicator correct';
                    questionCard.classList.add('correct-highlight');
                } else {
                    let correctAnswerText = '';
                    if (q.type === 'single') {
                        correctAnswerText = `Tačan odgovor: ${q.options[q.correct - 1]}`;
                    } else if (q.type === 'multiple') {
                        const correctTexts = q.correct.map(c => q.options[c - 1]);
                        const pointsPerCorrect = (q.points / q.correct.length).toFixed(2);
                        
                        let hasIncorrect = false;
                        if (userAnswer) {
                            const userSet = new Set(userAnswer);
                            const correctSet = new Set(q.correct);
                            for (let val of userSet) {
                                if (!correctSet.has(val)) {
                                    hasIncorrect = true;
                                    break;
                                }
                            }
                        }
                        
                        if (hasIncorrect) {
                            correctAnswerText = `Tačni odgovori: ${correctTexts.join(', ')}<br>⛔ Imate netačno označenu opciju, poeni: 0.`;
                        } else if (userAnswer && userAnswer.length > 0) {
                            const correctCount = userAnswer.filter(v => q.correct.includes(v)).length;
                            const earned = (correctCount * parseFloat(pointsPerCorrect)).toFixed(2);
                            correctAnswerText = `Tačni odgovori: ${correctTexts.join(', ')}<br>✅ Označili ste ${correctCount} od ${q.correct.length} tačnih opcija. Osvojeno ${earned} poena.`;
                        } else {
                            correctAnswerText = `Tačni odgovori: ${correctTexts.join(', ')}<br>📌 Niste označili nijednu opciju. Osvojeno 0 poena.`;
                        }
                    } else if (q.type === 'fill') {
                        correctAnswerText = `Tačan odgovor: ${q.correct[0]}`;
                    } else if (q.type === 'matching') {
                        const correctSequence = q.correct.join(' → ');
                        correctAnswerText = `Tačan redosled: ${correctSequence}`;
                    } else if (q.type === 'order') {
                        correctAnswerText = `Tačan redosled: ${q.correct.join(' → ')}`;
                    }
                    feedbackDiv.innerHTML = `❌ Netačno! ${correctAnswerText}<br>Osvojeno ${points.toFixed(2)} poena.`;
                    feedbackDiv.className = 'feedback-indicator incorrect';
                    questionCard.classList.add('incorrect-highlight');
                }
                
                // Vizuelna indikacija za polja
                if (q.type === 'fill') {
                    const input = document.getElementById(`fill-${idx}`);
                    if (input) {
                        if (checkFillAnswer(q, userAnswer)) {
                            input.classList.add('correct-answer');
                        } else if (userAnswer) {
                            input.classList.add('incorrect-answer');
                        }
                    }
                } else if (q.type === 'matching') {
                    for (let i = 0; i < q.correct.length; i++) {
                        const input = document.getElementById(`match-${idx}-${i}`);
                        if (input) {
                            const userVal = parseInt(userAnswer?.[i]);
                            if (userVal === q.correct[i]) {
                                input.classList.add('correct-answer');
                            } else if (userVal) {
                                input.classList.add('incorrect-answer');
                            }
                        }
                    }
                } else if (q.type === 'order') {
                    for (let i = 0; i < q.correct.length; i++) {
                        const input = document.getElementById(`order-${idx}-${i}`);
                        if (input) {
                            const userVal = parseInt(userAnswer?.[i]);
                            if (userVal === q.correct[i]) {
                                input.classList.add('correct-answer');
                            } else if (userVal) {
                                input.classList.add('incorrect-answer');
                            }
                        }
                    }
                }
            });
            
            const resultSection = document.getElementById('resultSection');
            const resultScore = document.getElementById('resultScore');
            const resultFeedback = document.getElementById('resultFeedback');
            
            resultSection.style.display = 'block';
            resultScore.innerHTML = `${totalPoints.toFixed(2)} / ${maxPoints}`;
            
            const percentage = (totalPoints / maxPoints) * 100;
            if (percentage >= 90) {
                resultFeedback.innerHTML = '🏆 Odličan rezultat! Izvanredno znanje! 🏆';
            } else if (percentage >= 70) {
                resultFeedback.innerHTML = '👍 Vrlo dobro! Imate solidno znanje. 👍';
            } else if (percentage >= 50) {
                resultFeedback.innerHTML = '📚 Zadovoljavajući rezultat. Imate prostora za napredak. 📚';
            } else {
                resultFeedback.innerHTML = '📖 Potrebno je više vežbe. Proučite gradivo i pokušajte ponovo. 📖';
            }
            
            document.querySelectorAll('input').forEach(input => {
                input.disabled = true;
            });
            
            resultSection.scrollIntoView({ behavior: 'smooth' });
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                if (testFinished) return;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    
                    const container = document.getElementById('testContent');
                    const timeExpiredDiv = document.createElement('div');
                    timeExpiredDiv.className = 'time-expired';
                    timeExpiredDiv.innerHTML = '⏰ Vreme je isteklo! Test se automatski završava. ⏰';
                    container.insertBefore(timeExpiredDiv, container.firstChild);
                    
                    finishTest();
                } else {
                    timeLeft--;
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    document.getElementById('timerDisplay').innerHTML = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    
                    if (timeLeft <= 60) {
                        document.getElementById('timerDisplay').style.color = '#dc3545';
                    }
                }
            }, 1000);
        }
        
        function resetTest() {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            timeLeft = 20 * 60;
            testFinished = false;
            document.getElementById('timerDisplay').innerHTML = '20:00';
            document.getElementById('timerDisplay').style.color = '#ffd700';
            document.getElementById('resultSection').style.display = 'none';
            renderQuestions();
            startTimer();
        }
        
        renderQuestions();
        startTimer();
    </script>
</body>
</html>
