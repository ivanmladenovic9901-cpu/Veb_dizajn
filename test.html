<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Veb dizajn test - Mobilna verzija</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Uklanja sivo osvetljenje pri tapu na mobilnim uredjajima */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: white;
            padding: 20px 16px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.8rem;
            line-height: 1.4;
        }

        .timer-section {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: #2c3e50;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .timer {
            font-size: 1.6rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            background: #2c3e50;
            color: #ffd700;
            padding: 6px 16px;
            border-radius: 40px;
            letter-spacing: 1px;
        }

        .question-counter {
            font-size: 0.95rem;
            font-weight: 600;
            background: rgba(0,0,0,0.1);
            padding: 6px 12px;
            border-radius: 30px;
        }

        .test-content {
            padding: 16px;
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            transition: all 0.2s ease;
        }

        .question-card.correct-highlight {
            border-left: 5px solid #28a745;
        }

        .question-card.incorrect-highlight {
            border-left: 5px solid #dc3545;
        }

        .question-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .question-points {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .question-body {
            padding: 16px;
        }

        .question-text {
            background: #fff;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #222;
            word-break: break-word;
        }

        /* === Poboljšanja za touch === */
        .fill-input, .matching-input, .order-input {
            width: 100%;
            padding: 14px 12px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            margin: 8px 0;
            font-family: 'Courier New', monospace;
            background: white;
            transition: border 0.2s;
            -webkit-appearance: none;
        }

        .fill-input:focus, .matching-input:focus, .order-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .fill-input.correct-answer {
            border-color: #28a745;
            background: #d4edda;
        }

        .fill-input.incorrect-answer {
            border-color: #dc3545;
            background: #f8d7da;
        }

        /* Matching i Order stilovi - mobilni prikaz */
        .matching-items, .order-items {
            margin: 10px 0;
        }

        .matching-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            padding: 12px;
            margin: 12px 0;
            background: white;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        .matching-left {
            font-weight: 700;
            color: #2c3e50;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            background: #f0f0f0;
            padding: 6px 10px;
            border-radius: 8px;
            width: 100%;
            word-break: break-word;
        }

        .matching-arrow {
            display: none; /* Sakriveno na mobilnom, štampa se kao tekst u nizu */
        }

        .matching-right {
            font-size: 0.85rem;
            color: #555;
            background: #fef9e6;
            padding: 8px 10px;
            border-radius: 8px;
            width: 100%;
            word-break: break-word;
        }

        .answer-line {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid #ddd;
            width: 100%;
            justify-content: space-between;
        }

        .answer-line label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 1rem;
        }

        .matching-input, .order-input {
            width: 70px;
            text-align: center;
            padding: 10px 0;
            font-size: 1rem;
            margin: 0;
        }

        .order-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin: 12px 0;
            background: white;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        .order-number {
            font-weight: bold;
            min-width: 35px;
            color: #667eea;
            font-size: 1rem;
        }

        .order-text {
            flex: 1;
            font-size: 0.85rem;
            color: #333;
            word-break: break-word;
            line-height: 1.4;
        }

        .order-input {
            width: 70px;
            margin-left: auto;
        }

        /* Opcije (radio/checkbox) */
        .options-list {
            margin: 15px 0;
        }

        .option-item {
            display: flex;
            align-items: flex-start;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            background: white;
            cursor: pointer;
            transition: background 0.2s;
        }

        .option-item:active {
            background: #e9ecef;
        }

        .option-checkbox, .option-radio {
            width: 22px;
            height: 22px;
            margin-right: 14px;
            margin-top: 2px;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #667eea;
        }

        .option-text {
            flex: 1;
            font-size: 0.9rem;
            color: #222;
            line-height: 1.4;
        }

        /* Feedback */
        .feedback-indicator {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .feedback-indicator.correct {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .feedback-indicator.incorrect {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        /* Dugmad */
        .action-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 20px 16px;
            padding: 12px 0;
            background: #f8f9fa;
            border-radius: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 140px;
            text-align: center;
            -webkit-appearance: none;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-finish {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            box-shadow: 0 2px 8px rgba(40,167,69,0.3);
        }

        .btn-reset {
            background: #6c757d;
            color: white;
        }

        /* Rezultati */
        .result-section {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 20px;
            border-radius: 20px;
            margin: 16px;
            text-align: center;
        }

        .result-score {
            font-size: 2rem;
            font-weight: bold;
            color: #28a745;
        }

        .result-feedback {
            margin-top: 12px;
            font-size: 0.95rem;
        }

        .time-expired {
            background: #dc3545;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 14px;
            margin: 16px 0;
            font-size: 0.9rem;
        }

        .points-indicator {
            font-size: 0.7rem;
            color: #6c757d;
            margin-left: 4px;
        }

        /* Sklanjanje horizontalnog skrola */
        pre, code {
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Poboljšanja za male ekrane */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }
            .question-header {
                font-size: 0.85rem;
            }
            .option-item {
                padding: 10px;
            }
            .btn {
                padding: 12px 16px;
                font-size: 0.9rem;
                min-width: 120px;
            }
            .timer {
                font-size: 1.4rem;
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📱 Veb dizajn test</h1>
        <p>20 nasumičnih pitanja • HTML, CSS, Internet</p>
    </div>

    <div class="timer-section">
        <div class="question-counter" id="questionCounter">Pitanja: 0 / 20</div>
        <div class="timer">
            ⏱️ <span id="timerDisplay">20:00</span>
        </div>
    </div>

    <div class="test-content" id="testContent">
        <div style="text-align: center; padding: 40px;">
            <p>Učitavanje testa...</p>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn btn-finish" id="finishBtn" onclick="finishTest()">✅ Završi test</button>
        <button class="btn btn-reset" onclick="resetTest()">🔄 Resetuj</button>
    </div>

    <div id="resultSection" style="display: none;" class="result-section">
        <div class="result-score" id="resultScore">0 / 0</div>
        <div class="result-feedback" id="resultFeedback"></div>
    </div>
</div>

<script>

                "Veb server obrađuje zahtev korisnika i pronalazi dinamičku stranu koju je korisnik zahtevao",
                "Veb server šalje preko Interneta generisani HTML kod veb pretraživaču."
            ], correct: [6, 4, 2, 1, 3, 5] },
        { id: 187,text:"Уредите појмове према захтеву.Дат је низ HTML наредби. Уписивањем редног броја на предвиђену линију (почев од броја 1 до броја 6) поређајте тачним редоследом HTLM наредбе у складу са основном структуром HTML странице:", type: "order", points: 3, steps: [
                "</body>",
                "<head>",
                "</html>",
                "<html>",
                "</head>",
                "<body>"
            ], correct: [5, 2, 6, 1, 3, 4] }
    ];

    let selectedQuestions = [];
    let userAnswers = {};
    let timeLeft = 20 * 60;
    let timerInterval = null;
    let testFinished = false;

    function selectRandomQuestions() {
        const shuffled = [...allQuestions];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, 20);
    }

    function getQuestionText(q) {
        if (q.id === 180 || q.id === 181 || q.id === 182) {
            return "Povezati pojmove prema zahtevu. Sa leve strane su dati numerisani HTML tagovi, a sa desne su navedeni indikatori. Na liniju upisati broj kojim se HTML tag povezuje sa odgovarajućim indikatorom:";
        } else if (q.id === 183) {
            return "Sa leve strane su dati internet servisi, a sa desne operacije. Na liniju ispred definisane operacije napisati broj odgovarajućeg servisa.";
        } else if (q.id === 184) {
            return "Povezati pojmove prema zahtevu. HTML forma – povežite tagove i atribute sa definicijama:";
        } else {
            return q.text;
        }
    }

    function renderFill(q, idx) {
        return `<input type="text" class="fill-input" id="fill-${idx}" placeholder="Unesite HTML kod..." oninput="saveFillAnswer(${idx}, this.value)">`;
    }

    function renderSingleChoice(q, idx) {
        let html = '<div class="options-list">';
        q.options.forEach((opt, optIdx) => {
            html += `
                <div class="option-item" onclick="document.getElementById('radio-${idx}-${optIdx}').click()">
                    <input type="radio" name="q-${idx}" id="radio-${idx}-${optIdx}" value="${optIdx + 1}" onchange="saveAnswer(${idx}, ${optIdx + 1})">
                    <span class="option-text">${opt}</span>
                </div>
            `;
        });
        html += '</div>';
        return html;
    }

    function renderMultipleChoice(q, idx) {
        let html = '<div class="options-list">';
        q.options.forEach((opt, optIdx) => {
            html += `
                <div class="option-item" onclick="document.getElementById('cb-${idx}-${optIdx}').click()">
                    <input type="checkbox" class="option-checkbox" id="cb-${idx}-${optIdx}" value="${optIdx + 1}" onchange="saveMultipleAnswer(${idx}, ${optIdx + 1})">
                    <span class="option-text">${opt}</span>
                </div>
            `;
        });
        html += '</div>';
        return html;
    }

    function renderMatching(q, idx) {
        let html = '<div class="matching-items">';
        for (let i = 0; i < q.leftItems.length; i++) {
            html += `
                <div class="matching-item">
                    <span class="matching-left">${q.leftItems[i]}</span>
                    <span class="matching-right">${q.rightItems[i]}</span>
                    <div class="answer-line">
                        <label>Odgovor →</label>
                        <input type="text" class="matching-input" id="match-${idx}-${i}" maxlength="1" placeholder="Broj" oninput="saveMatchingAnswer(${idx}, ${i}, this.value)">
                        <span class="points-indicator">(${(q.points / q.correct.length).toFixed(1)}p)</span>
                    </div>
                </div>
            `;
        }
        html += '</div>';
        return html;
    }

    function renderOrder(q, idx) {
        let html = '<div class="order-items">';
        q.steps.forEach((step, i) => {
            html += `
                <div class="order-item">
                    <span class="order-number">${i+1}.</span>
                    <span class="order-text">${step}</span>
                    <input type="text" class="order-input" id="order-${idx}-${i}" maxlength="1" placeholder="___" oninput="saveOrderAnswer(${idx}, ${i}, this.value)">
                </div>
            `;
        });
        html += '</div>';
        return html;
    }

    function renderQuestions() {
        selectedQuestions = selectRandomQuestions();
        userAnswers = {};
        const container = document.getElementById('testContent');
        let html = '';
        selectedQuestions.forEach((q, idx) => {
            html += `
                <div class="question-card" id="q-${idx}">
                    <div class="question-header">
                        <span>Pitanje ${idx + 1}</span>
                        <span class="question-points">${q.points} poena</span>
                    </div>
                    <div class="question-body">
                        <div class="question-text"><strong>${q.id}. </strong>${getQuestionText(q)}</div>
            `;
            if (q.type === 'single') html += renderSingleChoice(q, idx);
            else if (q.type === 'multiple') html += renderMultipleChoice(q, idx);
            else if (q.type === 'matching') html += renderMatching(q, idx);
            else if (q.type === 'order') html += renderOrder(q, idx);
            else if (q.type === 'fill') html += renderFill(q, idx);
            html += `<div class="feedback-indicator" id="feedback-${idx}"></div></div></div>`;
        });
        container.innerHTML = html;
        document.getElementById('questionCounter').innerHTML = `Pitanja: ${selectedQuestions.length} / 20`;
    }

    // Funkcije za čuvanje odgovora (identične originalu)
    function saveFillAnswer(qIdx, value) { if(!userAnswers[qIdx]) userAnswers[qIdx]={}; userAnswers[qIdx].answer=value.trim(); userAnswers[qIdx].type=selectedQuestions[qIdx].type; }
    function saveAnswer(qIdx, value) { if(!userAnswers[qIdx]) userAnswers[qIdx]={}; userAnswers[qIdx].answer=value; userAnswers[qIdx].type=selectedQuestions[qIdx].type; }
    function saveMultipleAnswer(qIdx, value) {
        if(!userAnswers[qIdx]) userAnswers[qIdx]={answer:[]};
        if(!userAnswers[qIdx].answer) userAnswers[qIdx].answer=[];
        const cb=document.getElementById(`cb-${qIdx}-${value-1}`);
        if(cb.checked) { if(!userAnswers[qIdx].answer.includes(value)) userAnswers[qIdx].answer.push(value); }
        else { userAnswers[qIdx].answer=userAnswers[qIdx].answer.filter(v=>v!==value); }
        userAnswers[qIdx].answer.sort((a,b)=>a-b);
        userAnswers[qIdx].type=selectedQuestions[qIdx].type;
    }
    function saveMatchingAnswer(qIdx, matchIdx, value) { if(!userAnswers[qIdx]) userAnswers[qIdx]={answer:[]}; if(!userAnswers[qIdx].answer) userAnswers[qIdx].answer=[]; userAnswers[qIdx].answer[matchIdx]=value; userAnswers[qIdx].type=selectedQuestions[qIdx].type; }
    function saveOrderAnswer(qIdx, stepIdx, value) { if(!userAnswers[qIdx]) userAnswers[qIdx]={answer:[]}; if(!userAnswers[qIdx].answer) userAnswers[qIdx].answer=[]; userAnswers[qIdx].answer[stepIdx]=value; userAnswers[qIdx].type=selectedQuestions[qIdx].type; }

    // Računanje poena (kraće, ali potpuno)
    function checkFillAnswer(q, userAnswer) { if(!userAnswer) return false; const norm=userAnswer.toLowerCase().replace(/\s+/g,' ').trim(); return q.correct.some(c=>c.toLowerCase().replace(/\s+/g,' ').trim()===norm); }
    function calculateMultipleChoicePoints(q, userAnswer) { if(!userAnswer||!userAnswer.length) return 0; const userSet=new Set(userAnswer), correctSet=new Set(q.correct); for(let v of userSet) if(!correctSet.has(v)) return 0; const pointsPerCorrect=q.points/correctSet.size; let correctCount=0; for(let v of userSet) if(correctSet.has(v)) correctCount++; return correctCount*pointsPerCorrect; }
    function checkMatching(q, userAnswer) { if(!userAnswer||userAnswer.length!==q.correct.length) return false; for(let i=0;i<q.correct.length;i++) if(parseInt(userAnswer[i])!==q.correct[i]) return false; return true; }
    function checkOrder(q, userAnswer) { if(!userAnswer||userAnswer.length!==q.correct.length) return false; for(let i=0;i<q.correct.length;i++) if(parseInt(userAnswer[i])!==q.correct[i]) return false; return true; }
    function calculatePoints(q, userAnswer) { if(q.type==='single') return (userAnswer===q.correct)?q.points:0; if(q.type==='multiple') return calculateMultipleChoicePoints(q,userAnswer); if(q.type==='matching') return checkMatching(q,userAnswer)?q.points:0; if(q.type==='order') return checkOrder(q,userAnswer)?q.points:0; if(q.type==='fill') return checkFillAnswer(q,userAnswer)?q.points:0; return 0; }
    function isFullyCorrect(q, userAnswer) { if(q.type==='single') return userAnswer===q.correct; if(q.type==='multiple'){ if(!userAnswer||!userAnswer.length) return false; const userSet=new Set(userAnswer), correctSet=new Set(q.correct); if(userSet.size!==correctSet.size) return false; for(let v of userSet) if(!correctSet.has(v)) return false; return true; } if(q.type==='matching') return checkMatching(q,userAnswer); if(q.type==='order') return checkOrder(q,userAnswer); if(q.type==='fill') return checkFillAnswer(q,userAnswer); return false; }

    function finishTest() {
        if(testFinished) return;
        if(timerInterval) clearInterval(timerInterval);
        testFinished=true;
        let totalPoints=0, maxPoints=0;
        selectedQuestions.forEach((q,idx)=>{
            const userAnswer=userAnswers[idx]?.answer;
            const points=calculatePoints(q,userAnswer);
            const fullyCorrect=isFullyCorrect(q,userAnswer);
            totalPoints+=points; maxPoints+=q.points;
            const fb=document.getElementById(`feedback-${idx}`);
            const card=document.getElementById(`q-${idx}`);
            if(fullyCorrect){
                fb.innerHTML=`✅ Tačno! +${points.toFixed(2)} poena.`;
                fb.className='feedback-indicator correct';
                card.classList.add('correct-highlight');
            } else {
                let correctText='';
                if(q.type==='single') correctText=`Tačan odgovor: ${q.options[q.correct-1]}`;
                else if(q.type==='multiple'){ const correctTexts=q.correct.map(c=>q.options[c-1]); correctText=`Tačni: ${correctTexts.join(', ')}`; }
                else if(q.type==='fill') correctText=`Tačno: ${q.correct[0]}`;
                else if(q.type==='matching') correctText=`Redosled: ${q.correct.join(' → ')}`;
                else if(q.type==='order') correctText=`Redosled: ${q.correct.join(' → ')}`;
                fb.innerHTML=`❌ Netačno! ${correctText}<br>Osvojeno ${points.toFixed(2)} poena.`;
                fb.className='feedback-indicator incorrect';
                card.classList.add('incorrect-highlight');
            }
            // vizuelna obeležja polja
            if(q.type==='fill'){ let inp=document.getElementById(`fill-${idx}`); if(inp){ if(checkFillAnswer(q,userAnswer)) inp.classList.add('correct-answer'); else if(userAnswer) inp.classList.add('incorrect-answer'); } }
            if(q.type==='matching'){ for(let i=0;i<q.correct.length;i++){ let inp=document.getElementById(`match-${idx}-${i}`); if(inp){ let uv=parseInt(userAnswer?.[i]); if(uv===q.correct[i]) inp.classList.add('correct-answer'); else if(uv) inp.classList.add('incorrect-answer'); } } }
            if(q.type==='order'){ for(let i=0;i<q.correct.length;i++){ let inp=document.getElementById(`order-${idx}-${i}`); if(inp){ let uv=parseInt(userAnswer?.[i]); if(uv===q.correct[i]) inp.classList.add('correct-answer'); else if(uv) inp.classList.add('incorrect-answer'); } } }
        });
        const resSec=document.getElementById('resultSection');
        document.getElementById('resultScore').innerHTML=`${totalPoints.toFixed(2)} / ${maxPoints}`;
        let perc=(totalPoints/maxPoints)*100;
        let msg=perc>=90?"🏆 Odličan rezultat!":perc>=70?"👍 Vrlo dobro!":perc>=50?"📚 Zadovoljavajući.":"📖 Potrebno više vežbe.";
        document.getElementById('resultFeedback').innerHTML=msg;
        resSec.style.display='block';
        document.querySelectorAll('input').forEach(i=>i.disabled=true);
        resSec.scrollIntoView({behavior:'smooth'});
    }

    function startTimer(){
        if(timerInterval) clearInterval(timerInterval);
        timerInterval=setInterval(()=>{
            if(testFinished) return;
            if(timeLeft<=0){
                clearInterval(timerInterval);
                document.getElementById('testContent').insertAdjacentHTML('afterbegin','<div class="time-expired">⏰ Vreme je isteklo! Test se automatski završava.</div>');
                finishTest();
            } else {
                timeLeft--;
                let m=Math.floor(timeLeft/60), s=timeLeft%60;
                document.getElementById('timerDisplay').innerHTML=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if(timeLeft<=60) document.getElementById('timerDisplay').style.color='#dc3545';
            }
        },1000);
    }

    function resetTest(){
        if(timerInterval) clearInterval(timerInterval);
        timeLeft=20*60;
        testFinished=false;
        document.getElementById('timerDisplay').innerHTML='20:00';
        document.getElementById('timerDisplay').style.color='#ffd700';
        document.getElementById('resultSection').style.display='none';
        renderQuestions();
        startTimer();
    }

    renderQuestions();
    startTimer();
</script>
</body>
</html>
